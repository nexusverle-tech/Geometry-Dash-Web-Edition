<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Dash v2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Game Layer -->
    <canvas id="gameCanvas"></canvas>

    <!-- UI Layer -->
    <div id="ui-layer">
        
        <!-- 1. Main Menu -->
        <div id="menu-main" class="menu-screen active">
            <img src="logo.png" class="logo" alt="Geometry Dash">
            <div class="btn-row">
                <button onclick="showScreen('menu-levels')" class="btn-large">PLAY</button>
                <button onclick="showScreen('menu-icons')" class="btn-icon">
                    <div class="icon-preview-btn"></div>
                </button>
            </div>
        </div>

        <!-- 2. Level Select -->
        <div id="menu-levels" class="menu-screen">
            <h2>SELECT LEVEL</h2>
            <div class="level-grid">
                <div class="level-card" onclick="loadLevel(0)">
                    <div class="level-title">Stereo Madness</div>
                    <div class="level-diff difficulty-easy">EASY</div>
                </div>
                <div class="level-card" onclick="loadLevel(1)">
                    <div class="level-title">Back on Track</div>
                    <div class="level-diff difficulty-med">NORMAL</div>
                </div>
                <div class="level-card" onclick="loadLevel(2)">
                    <div class="level-title">Polargeist</div>
                    <div class="level-diff difficulty-hard">HARD</div>
                </div>
            </div>
            <button onclick="showScreen('menu-main')" class="btn-back">BACK</button>
        </div>

        <!-- 3. Icon Kit -->
        <div id="menu-icons" class="menu-screen">
            <h2>ICON KIT</h2>
            
            <div class="kit-display">
                <canvas id="previewCanvas" width="100" height="100"></canvas>
            </div>

            <div class="color-picker">
                <h3>Color 1</h3>
                <div class="swatches" id="col1-swatches"></div>
                <h3>Color 2</h3>
                <div class="swatches" id="col2-swatches"></div>
            </div>

            <button onclick="showScreen('menu-main')" class="btn-back">BACK</button>
        </div>

        <!-- 4. Game HUD -->
        <div id="hud" class="hidden">
            <div id="progress-bar"><div id="progress-fill"></div></div>
            <button onclick="quitGame()" class="btn-pause">||</button>
        </div>

    </div>

    <script src="game.js"></script>
</body>
</html>
